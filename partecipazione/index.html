  /* ---- Nume: 141px, scalat pe ecrane mici ---- */
  /* ---- Nume: fiecare rand umple toata latimea ---- */
  .names{
    width:100vw;
    padding:clamp(18px,4vw,42px) 1px 0;
  }
  .names .name-line{
    display:block;
    width:100%;
    height:auto;
  }
  .names .name-line + .name-line{ margin-top:0.6vw; }
  .names .name-line text{
    font-family:var(--serif);
    font-weight:500;
    fill:var(--sage);
  }

  /* ---- Invitatie (mijloc) ---- */
  .invite{
    max-width:560px;
    padding:clamp(30px,6vw,60px) clamp(24px,5vw,50px);
    font-size:clamp(1.05rem,2.4vw,1.35rem);
    font-weight:300;
    line-height:1.7;
  }
  .invite .lead{margin-bottom:1.6rem;}

  .date-main{
    font-family:var(--serif);
    font-weight:500;
    color:var(--sage);
    font-size:clamp(1.6rem,5vw,2.4rem);
    line-height:1.2;
    margin:1.4rem 0 1.8rem;
  }

  .venue{font-size:clamp(1.05rem,2.4vw,1.3rem);line-height:1.7;margin-bottom:1.8rem;}

  .welcome{
    font-family:var(--serif);
    font-weight:500;
    color:var(--soft);
    font-size:clamp(1.6rem,5vw,2.4rem);
    letter-spacing:0.3px;
    margin-bottom:clamp(36px,7vw,60px);
  }

  /* ---- Iconita locatie (2.svg) + pulse ---- */
  .location{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    gap:0.7rem;
    text-decoration:none;
    color:var(--contrast);
  }
  .location .pin{
    width:clamp(78px,16vw,104px);
    height:auto;
    animation:pulse 1.6s ease-in-out infinite;
    transition:transform .3s ease;
  }
  .location:hover .pin{transform:scale(1.08);}
  .location .label{
    font-family:var(--sans);
    font-weight:600;
    font-size:1rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--soft);
  }
  @keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.12);}
    100%{transform:scale(1);}
  }
